<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Daily Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="gradient-bg">
  <header class="site-header reading-header">
    <a class="back-link" href="index.html">&#8592; Home</a>
    <div class="lang-switcher" aria-label="Language switcher">
      <button type="button" class="lang-btn" data-lang="en">EN</button>
      <span class="lang-divider">|</span>
      <button type="button" class="lang-btn" data-lang="th">TH</button>
    </div>
  </header>

  <main class="reading">
    <h1 class="reading-title" data-i18n="title">Tarot of the Day</h1>
    <p class="reading-subtitle" data-i18n="subtitle">Discover what the cards whisper about your journey.</p>

    <button id="draw-btn" class="btn primary" type="button" data-i18n="draw">Draw 3 Cards</button>

    <section id="cards-container" class="cards-container" aria-live="polite"></section>
    <section id="conclusion" class="conclusion" aria-live="polite"></section>
  </main>

  <footer class="site-footer">© 2025 Tarot Project by KiR</footer>

  <script src="script.js" defer></script>
</body>
</html>
